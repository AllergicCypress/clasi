version: 3

# hints.yaml — casos especiales que el motor de descubrimiento no puede inferir.
# NO contiene temas académicos ni rutas hardcodeadas.
# El descubrimiento dinámico de carpetas reemplaza todo eso.
#
# NOTA: Este archivo reemplaza a rules.yaml (v2).
# El backup del archivo anterior está en rules.yaml.bak

hints:

  # Duplicados por nombre de descarga
  - nombre: duplicados_descarga
    filter_mode: any
    filtros:
      - nombre_contiene: [" (1)", " (2)", " (3)", ".crdownload"]
    accion_especial: marcar_duplicado
    conflicto: rename_new

  # Instaladores — clasificación por extensión, sin semántica temática
  - nombre: instaladores
    filter_mode: any
    filtros:
      - extension: [".exe", ".msi", ".run", ".deb", ".rpm", ".AppImage"]
    accion_especial: carpeta_especial
    nombre_carpeta: Software_Instaladores
    conflicto: skip

  # Imágenes sin texto legible — si OCR extrae texto útil, pasan al clasificador
  - nombre: imagenes_sueltas
    filter_mode: all
    filtros:
      - extension: [".jpg", ".jpeg", ".png", ".gif", ".webp", ".bmp", ".svg", ".tiff"]
      - sin_texto_util: true
    accion_especial: carpeta_especial
    nombre_carpeta: Imágenes_Generales
    conflicto: rename_new

  # Archivos comprimidos
  - nombre: comprimidos
    filter_mode: any
    filtros:
      - extension: [".zip", ".tar", ".gz", ".bz2", ".xz", ".7z", ".rar"]
    accion_especial: carpeta_especial
    nombre_carpeta: Comprimidos
    conflicto: skip

  # Originales cuya versión _merged ya existe: el _merged los contiene,
  # así que el original es el redundante — va a _Duplicados para revisión.
  - nombre: original_con_merged
    filtros:
      - tiene_merged: true
    accion_especial: marcar_duplicado
    conflicto: skip

  # PDFs con texto extraído corrupto (fuente sin tabla de codificación real,
  # típico de escaneos o impresiones a PDF mal generadas): clasi no puede
  # leer su contenido, así que tampoco debería adivinar destino con tokens
  # basura — mejor aislarlos para revisión manual o reprocesarlos con OCR.
  - nombre: pdf_texto_corrupto
    filter_mode: all
    filtros:
      - extension: [".pdf"]
      - texto_corrupto: true
    accion_especial: carpeta_especial
    nombre_carpeta: PDF_Texto_Corrupto
    conflicto: skip

  # ── filtro python: ejemplo (deshabilitado) ────────────────────────────────
  # El filtro 'python' evalúa una expresión Python arbitraria.
  # Variables disponibles: archivo (Path), texto (str), nombre, stem, sufijo,
  #   re (módulo), Path (clase).
  # La expresión debe devolver True/False.
  #
  # Ejemplo: marcar facturas de noviembre en PDF
  #
  # - nombre: facturas_noviembre
  #   filter_mode: all
  #   filtros:
  #     - python: "sufijo == '.pdf' and re.search(r'factura|invoice', texto, re.I) is not None"
  #     - python: "re.search(r'nov(iembre)?|november', texto, re.I) is not None"
  #   accion_especial: carpeta_especial
  #   nombre_carpeta: Facturas/2024-11
  #   conflicto: rename_new
